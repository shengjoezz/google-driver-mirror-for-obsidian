name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Package release assets
        run: |
          mkdir -p dist
          zip -j "dist/google-drive-mirror-${GITHUB_REF_NAME}.zip" \
            main.js manifest.json styles.css versions.json README.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
            versions.json
            dist/google-drive-mirror-${{ github.ref_name }}.zip
